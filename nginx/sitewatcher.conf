server {
    listen 80;
    server_name sitewatcher.example.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sitewatcher.example.com;

    # SSL certificates (adjust paths as needed)
    ssl_certificate     /etc/letsencrypt/live/sitewatcher.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sitewatcher.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Basic auth for dashboard
    auth_basic "SiteWatcher";
    auth_basic_user_file /etc/nginx/.htpasswd_sitewatcher;

    # API endpoints — use API key auth instead of basic auth
    location /api/ {
        auth_basic off;
        proxy_pass http://sitewatcher:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check — no auth
    location /api/health {
        auth_basic off;
        proxy_pass http://sitewatcher:8000;
    }

    # Static data files
    location /static/ {
        auth_basic off;
        proxy_pass http://sitewatcher:8000;
    }

    # Dashboard (frontend)
    location / {
        proxy_pass http://sitewatcher:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Limits
    client_max_body_size 20M;
}
